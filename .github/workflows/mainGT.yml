name: Build and Upload

on:
  push:
    branches:
      - main  # Change this to the branch you want to trigger the workflow on

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v2

    - name: Set up Node.js (or your environment)
      uses: actions/setup-node@v2
      with:
        node-version: 18.x  # Specify the Node.js version or your required environment

    - name: Install dependencies
      run: npm install  # Use your project's dependency management command

    - name: Build the project
      run: npm run build:nativebridge  # Use your project's build command

    - name: Build the core
      run: cd core && npm i && npm run build && cd ..  # Use your project's build 

    - name: Build the ios
      run: cd ios && npm i && npm run xc:build:Capacitor && npm run xc:build:CapacitorCordova && npm run xc:build:xcframework && cd ..
    
    - name: Build the cli
      run: cd cli && npm i && npm run build  # Use your project's build

    - name: Checkout target repository for core
      uses: actions/checkout@v2
      with:
        repository: rencsikmarian/capacitorGT-core  # Replace with your target repository for core
        token: ${{ secrets.CAPACITORGT_TOKEN }}
        path: capacitorGT-core

    - name: Copy core build artifacts
      run: |
        cp -r core/build/* capacitorGT-core/

    - name: Commit and push core build artifacts
      run: |
        cd capacitorGT-core
        git config --global user.email "mariann4you@gmail.com"  # Set your email
        git config --global user.name "rencsikmarian"  # Set your username
        git add .
        git commit -m "Upload core build artifacts"
        git push

    - name: Checkout target repository for ios
      uses: actions/checkout@v2
      with:
        repository: rencsikmarian/capacitorGT-ios  # Replace with your target repository for ios
        token: ${{ secrets.CAPACITORGT_TOKEN }}
        path: capacitorGT-ios

    - name: Copy ios build artifacts
      run: |
        cp -r ios/build/* capacitorGT-ios/

    - name: Commit and push ios build artifacts
      run: |
        cd capacitorGT-ios
        git config --global user.email "mariann4you@gmail.com"  # Set your email
        git config --global user.name "rencsikmarian"  # Set your username
        git add .
        git commit -m "Upload ios build artifacts"
        git push

    - name: Checkout target repository for cli
      uses: actions/checkout@v2
      with:
        repository: rencsikmarian/capacitorGT-cli  # Replace with your target repository for cli
        token: ${{ secrets.CAPACITORGT_TOKEN }}
        path: capacitorGT-cli

    - name: Copy cli build artifacts
      run: |
        cp -r cli/build/* capacitorGT-cli/

    - name: Commit and push cli build artifacts
      run: |
        cd capacitorGT-cli
        git config --global user.email "mariann4you@gmail.com"  # Set your email
        git config --global user.name "rencsikmarian"  # Set your username
        git add .
        git commit -m "Upload cli build artifacts"
        git push
